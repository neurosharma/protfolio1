@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

:root {
  --bg: #f7f1e8;
  --card: rgba(255, 255, 255, 0.72);
  --text: #2f2f2f;
  --muted: #6b645d;
  --line: rgba(47, 47, 47, 0.09);
  --shadow: 0 18px 42px rgba(47, 47, 47, 0.12);
  --radius: 28px;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: var(--text);
  background: radial-gradient(circle at top left, rgba(255,255,255,0.92), transparent 30%), var(--bg);
  line-height: 1.6;
}
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }
.container { width: min(1180px, calc(100% - 36px)); margin: 0 auto; }
header {
  position: sticky; top: 0; z-index: 20;
  background: rgba(247, 241, 232, 0.82); backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--line);
}
.nav {
  display: flex; align-items: center; justify-content: space-between; gap: 18px;
  padding: 24px 0; flex-wrap: wrap;
}
.brand { font-size: 1.8rem; font-weight: 700; letter-spacing: -0.04em; }
.nav-links { display: flex; gap: 28px; flex-wrap: wrap; color: var(--muted); font-size: 1rem; }
.nav-links a:hover { color: var(--text); }
.hero { padding: 72px 0 34px; text-align: center; }
.hero h1 { margin: 0; font-size: clamp(2.8rem, 5vw, 4.6rem); line-height: 1; letter-spacing: -0.06em; }
.hero p { margin: 18px auto 0; max-width: 760px; color: var(--muted); font-size: 1.06rem; }
.section { padding: 34px 0 72px; }
.panel {
  background: var(--card); border: 1px solid var(--line); box-shadow: var(--shadow);
  border-radius: var(--radius); padding: 42px; backdrop-filter: blur(10px);
}
.section-title { text-align: center; font-size: clamp(2rem, 3vw, 3rem); margin: 0 0 28px; letter-spacing: -0.04em; }
.hero-home { display: grid; grid-template-columns: 1.15fr 0.85fr; gap: 32px; align-items: center; min-height: 72vh; text-align: left; }
.hero-home h1 { font-size: clamp(3.2rem, 7vw, 6.1rem); line-height: 0.95; margin: 0 0 22px; max-width: 9ch; }
.hero-home p { color: var(--muted); font-size: 1.18rem; max-width: 44rem; margin: 0 0 30px; }
.buttons { display: flex; flex-direction: column; gap: 18px; width: fit-content; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; min-width: 185px;
  padding: 16px 26px; border-radius: 999px; background: rgba(255,255,255,0.76);
  border: 1px solid var(--line); box-shadow: var(--shadow); font-weight: 600;
  transition: transform 0.18s ease, box-shadow 0.18s ease;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 22px 50px rgba(47,47,47,0.14); }
.hero-image {
  justify-self: end; width: min(100%, 470px); aspect-ratio: 1 / 1.06; border-radius: 34px; overflow: hidden;
  box-shadow: var(--shadow); border: 1px solid var(--line); background: rgba(255,255,255,0.35);
}
.hero-image img { width: 100%; height: 100%; object-fit: cover; }
.about-grid, .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.info-card { padding: 24px; border-radius: 24px; background: rgba(255,255,255,0.68); border: 1px solid var(--line); }
.info-card h3 { margin: 0 0 12px; font-size: 1.2rem; }
.info-card p, .info-card li { color: var(--muted); }
.info-card ul { margin: 0; padding-left: 18px; }
.skills { display: flex; flex-wrap: wrap; gap: 12px; }
.skill { padding: 12px 16px; border-radius: 999px; background: rgba(255,255,255,0.74); border: 1px solid var(--line); font-weight: 500; }
.timeline { display: grid; gap: 18px; }
.timeline-item { padding: 22px; border-radius: 22px; background: rgba(255,255,255,0.68); border: 1px solid var(--line); }
.timeline-item small { display: block; color: var(--muted); margin-bottom: 6px; }
.projects-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 26px; }
.project-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--line); box-shadow: var(--shadow); padding: 22px; }
.project-image { width: 100%; height: 260px; border-radius: 18px; overflow: hidden; background: #fff; border: 1px solid var(--line); margin-bottom: 22px; }
.project-image img { width: 100%; height: 100%; object-fit: cover; }
.project-card h2 { margin: 0 0 18px; font-size: clamp(1.5rem, 2vw, 2.1rem); line-height: 1.15; letter-spacing: -0.04em; }
.source-link { display: inline-flex; align-items: center; justify-content: center; width: 100%; padding: 16px 18px; border-radius: 18px; background: rgba(255,255,255,0.72); border: 1px solid var(--line); font-weight: 600; transition: transform 0.18s ease, box-shadow 0.18s ease; }
.source-link:hover { transform: translateY(-2px); box-shadow: 0 12px 24px rgba(47,47,47,0.12); }
.contact-list { display: grid; gap: 12px; }
.contact-list a { padding: 16px 18px; border-radius: 18px; background: rgba(255,255,255,0.74); border: 1px solid var(--line); font-weight: 500; }
footer { padding: 0 0 40px; text-align: center; color: var(--muted); }
@media (max-width: 980px) {
  .hero-home, .about-grid, .projects-grid, .contact-grid { grid-template-columns: 1fr; }
  .hero-image { justify-self: start; width: min(100%, 520px); }
  .nav { flex-direction: column; align-items: flex-start; }
  .nav-links { gap: 18px; }
  .hero-home h1 { max-width: 100%; }
}
@media (max-width: 640px) {
  .container { width: min(100% - 22px, 1180px); }
  .hero { padding-top: 46px; }
  .panel { padding: 24px; }
  .buttons { width: 100%; }
  .btn { width: 100%; }
  .project-image { height: 220px; }
}
